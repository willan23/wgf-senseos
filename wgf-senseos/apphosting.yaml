# Settings for Firebase App Hosting
# Configuração para o WGF SenseOS MVP

schemaVersion: v1beta

runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyAIYgbzH0rit0vCbJMkRQDQZJpVhGiHIxc
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: wgf-senseos.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: wgf-senseos
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: wgf-senseos.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "699903815018"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:699903815018:web:de1453f75b86bbbc59c913"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    value: https://wgf-senseos.web.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SIMULATION_ONLY
    value: "false"
    availability:
      - BUILD
      - RUNTIME
